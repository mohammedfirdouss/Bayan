services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bayan_db
    environment:
      POSTGRES_USER: bayan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bayan
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/00_extensions.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bayan -d bayan"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: '256mb'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bayan_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bayan:${POSTGRES_PASSWORD}@db:5432/bayan
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./quran-data:/app/quran-data:ro
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bayan_ingestion
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bayan:${POSTGRES_PASSWORD}@db:5432/bayan
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./quran-data:/app/quran-data:ro
      - ./backend:/app
    command: python ingestion/run_all.py
    profiles:
      - ingestion

volumes:
  pgdata:
    driver: local
